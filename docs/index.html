<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'" />
    <meta name="theme-color" content="#FF5A45" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="午餐轮盘" />
    <title>午餐轮盘</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=15.1.0" />
  </head>
  <body>
    <main class="app-shell">
      <!-- Roulette page -->
      <section id="roulettePage" class="app-page active">
      <header class="topbar">
        <div class="title-block">
          <h1>午餐轮盘</h1>
          <p class="subtitle">不知道吃什么？交给运气吧 🍴</p>
        </div>
      </header>
      <input id="backupInput" type="file" accept="application/json,.json" hidden />

      <section class="wheel-area" aria-label="午餐轮盘">
        <div class="pointer"></div>
        <canvas id="wheel" width="720" height="720"></canvas>
        <button id="centerPickBtn" class="wheel-center" type="button" aria-label="点击抽取">
          <span>🎉</span>
          <strong>点击抽取</strong>
        </button>
      </section>

      <section class="section-head history-head">
        <h2>最近记录</h2>
        <span>近7天</span>
      </section>
      <div id="historyList" class="history-list"></div>
      </section>

      <!-- Data page -->
      <section id="dataPage" class="app-page">
        <header class="page-head compact-page-head">
          <h1>数据</h1>
        </header>
        <section class="data-card">
          <div class="data-card-head">
            <h3 id="axisTitle">本周总结</h3>
            <span id="historyStats">0条记录</span>
          </div>
          <div class="segmented-control" aria-label="选择数据范围">
            <button id="weekRangeBtn" class="active" type="button">周</button>
            <button id="monthRangeBtn" type="button">月</button>
          </div>
          <div id="weekAxis" class="week-axis"></div>
          <div id="axisDetail" class="axis-detail"></div>
        </section>
        <section class="data-card history-cache-card">
          <div class="data-card-head">
            <h3>历史缓存</h3>
            <div class="history-select-tools">
              <span id="selectedHistoryCount" hidden></span>
              <button id="openCleanupBtn" class="text-btn compact-mini" type="button">清理</button>
              <button id="deleteSelectedHistoryBtn" class="danger-btn compact" type="button" hidden>删除选中</button>
            </div>
          </div>
          <div id="timelineList" class="timeline-list"></div>
        </section>
      </section>

      <!-- Shops page -->
      <section id="shopsPage" class="app-page">
        <header class="page-head settings-head">
          <div>
            <h1>店铺</h1>
          </div>
          <div class="settings-actions">
            <button id="settingsAddBtn" class="shop-add-btn" type="button"><span>+</span>添加店铺</button>
          </div>
        </header>
        <div class="settings-filters">
          <label>
            <span>搜索</span>
            <input id="restaurantSearchInput" type="search" maxlength="40" placeholder="店名、标签或备注" />
          </label>
          <label>
            <span>筛选</span>
            <select id="categoryFilterSelect"></select>
          </label>
        </div>
        <div id="restaurantList" class="restaurant-list settings-list"></div>
      </section>

      <!-- Settings page -->
      <section id="settingsPage" class="app-page">
        <header class="page-head compact-page-head">
          <h1>设置</h1>
        </header>
        <section class="data-card version-card">
          <span>当前版本</span>
          <strong>v15.1.0</strong>
        </section>
        <section class="data-card settings-tools-card">
          <button id="exportBtn" class="settings-tool-btn" type="button"><span class="action-file-icon action-export-icon" aria-hidden="true"></span>备份店铺数据</button>
          <button id="importBtn" class="settings-tool-btn" type="button"><span class="action-file-icon action-import-icon" aria-hidden="true"></span>导入店铺数据</button>
          <button id="openTagManagerBtn" class="settings-tool-btn" type="button"><span class="action-tag-icon" aria-hidden="true">#</span>编辑现有标签</button>
        </section>
      </section>
    </main>

    <!-- Bottom navigation -->
    <nav class="bottom-nav" aria-label="主导航">
      <button id="rouletteNavBtn" class="active" type="button"><span class="nav-wheel-icon" aria-hidden="true"></span>轮盘</button>
      <button id="dataNavBtn" type="button"><span class="nav-data-icon" aria-hidden="true"></span>数据</button>
      <button id="shopsNavBtn" type="button"><span class="nav-shop-icon" aria-hidden="true"></span>店铺</button>
      <button id="settingsNavBtn" type="button"><span class="nav-settings-icon" aria-hidden="true"></span>设置</button>
    </nav>

    <!-- Dialogs -->
    <dialog id="resultDialog">
      <section class="result-modal">
        <header class="dialog-head">
          <div class="result-icon">🎉</div>
          <button id="closeResultBtn" class="text-btn" type="button">关闭</button>
        </header>
        <div class="result-copy">
          <p id="resultLabel" class="result-label">今天吃什么？</p>
          <p id="resultNote" class="result-note">让轮盘帮你做决定！</p>
          <div id="resultLinks" class="result-links"></div>
        </div>
      </section>
    </dialog>

    <dialog id="restaurantDetailDialog">
      <section class="detail-modal">
        <header class="dialog-head">
          <div>
            <div id="detailIcon" class="result-icon">🍽</div>
          </div>
          <button id="closeDetailBtn" class="text-btn" type="button">关闭</button>
        </header>
        <div class="detail-copy">
          <p id="detailName" class="result-label">店铺</p>
          <p id="detailMeta" class="detail-meta"></p>
          <p id="detailNote" class="result-note"></p>
          <div id="detailLinks" class="result-links"></div>
        </div>
        <footer class="dialog-actions">
          <button id="editDetailBtn" class="primary-btn compact" type="button">编辑</button>
        </footer>
      </section>
    </dialog>

    <dialog id="wheelCandidateDialog">
      <section class="detail-modal">
        <header class="dialog-head">
          <div>
            <h2>选择店铺</h2>
            <p class="dialog-note">这里有几个较小的轮盘区域</p>
          </div>
          <button id="closeWheelCandidateBtn" class="text-btn" type="button">关闭</button>
        </header>
        <div id="wheelCandidateList" class="candidate-list"></div>
      </section>
    </dialog>

    <dialog id="tagManagerDialog">
      <section class="detail-modal">
        <header class="dialog-head">
          <div>
            <h2>标签管理</h2>
            <p class="dialog-note">标签会按店铺内容自动生成</p>
          </div>
          <button id="closeTagManagerBtn" class="text-btn" type="button">关闭</button>
        </header>
        <div id="tagList" class="tag-list"></div>
      </section>
    </dialog>

    <dialog id="cleanupDialog">
      <section class="detail-modal cleanup-modal">
        <header class="dialog-head">
          <h2>清理历史</h2>
          <button id="closeCleanupBtn" class="text-btn" type="button">关闭</button>
        </header>
        <label class="cache-cleaner">
          <span>将此日期以前的记录清除</span>
          <input id="purgeBeforeInput" type="date" />
        </label>
        <div class="data-actions">
          <button id="purgeHistoryBtn" class="danger-btn compact" type="button">删除</button>
        </div>
      </section>
    </dialog>

    <dialog id="axisDetailDialog">
      <section class="detail-modal">
        <header class="dialog-head">
          <h2 id="axisDialogTitle">当天记录</h2>
          <button id="closeAxisDetailBtn" class="text-btn" type="button">关闭</button>
        </header>
        <div id="axisDialogContent" class="axis-detail-list"></div>
      </section>
    </dialog>

    <dialog id="editorDialog">
      <form id="editorForm" method="dialog" class="editor">
        <header class="dialog-head">
          <h2 id="dialogTitle">添加店铺</h2>
          <button id="closeDialogBtn" class="text-btn" type="button">取消</button>
        </header>

        <div class="editor-field">
          <span class="field-label">店名</span>
          <div class="name-entry">
            <input id="nameInput" required maxlength="40" autocomplete="off" aria-label="店名" />
            <label class="inline-switch">
              <span>参与抽取</span>
              <input id="enabledInput" type="checkbox" checked />
            </label>
          </div>
        </div>

        <label>
          <span>备注或链接</span>
          <textarea id="noteInput" rows="3" maxlength="500" placeholder="粘贴 Google Maps 链接，可自动填入部分店名"></textarea>
        </label>

        <label>
          <span>标签（料理类型）</span>
          <div class="category-entry">
            <input id="categoryInput" maxlength="24" autocomplete="off" placeholder="直接输入以添加新标签" />
            <select id="categoryPresetSelect" aria-label="选择标签"></select>
          </div>
        </label>

        <label>
          <span>上次吃过 <strong id="daysValue">7天以上</strong></span>
          <input id="daysInput" type="range" min="0" max="7" step="1" value="7" />
        </label>

        <div>
          <span class="field-title">食物图标</span>
          <div class="choice-window icon-window">
            <div id="iconGrid" class="icon-grid"></div>
          </div>
        </div>

        <div>
          <span class="field-title">颜色</span>
          <div class="choice-window color-window">
            <div id="colorGrid" class="color-grid"></div>
          </div>
        </div>

        <footer class="dialog-actions">
          <button id="deleteBtn" class="danger-btn" type="button">删除</button>
          <button class="primary-btn compact" type="submit">保存</button>
        </footer>
      </form>
    </dialog>

    <script src="./app.js?v=15.1.0"></script>
  </body>
</html>
